[global]
   workgroup = HOMELAB
   server string = Yeast Storage Server
   security = user
   passdb backend = tdbsam
   map to guest = never
   dns proxy = no

[shared]
   path = /srv/smb/shared
   valid users = yeast
   read only = no
   browsable = yes

[backup]
   path = /srv/smb/backup
   valid users = yeast
   read only = no
   browsable = yes
