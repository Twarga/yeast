version: 1
networks:
  - name: backend
    cidr: 192.168.2.0/24
instances:
  - name: hub
    hostname: hub-lab
    image: ubuntu-24.04
    memory: 512
    cpus: 1
    ssh_port: 2222
    user: yeast
    sudo: nopasswd
    ports:
      - host_port: 51820
        guest_port: 51820
    networks:
      - name: backend
        ipv4: 192.168.2.1
    provision:
      packages:
        - wireguard
        - wireguard-tools
        - iptables
      files:
        - source: ./files/hub/wg0.conf
          destination: /home/yeast/hub/wg0.conf
          permissions: "0600"
      shell:
        - sudo mkdir -p /etc/wireguard
        - sudo cp /home/yeast/hub/wg0.conf /etc/wireguard/wg0.conf
        - sudo chmod 600 /etc/wireguard/wg0.conf
        - sudo wg-quick up wg0 || true
        - sudo systemctl enable wg-quick@wg0
        - sudo sysctl -w net.ipv4.ip_forward=1
        - sudo iptables -t nat -A POSTROUTING -o ens3 -j MASQUERADE
        - sudo iptables -A FORWARD -i wg0 -o ens3 -j ACCEPT
        - sudo iptables -A FORWARD -i ens3 -o wg0 -m state --state RELATED,ESTABLISHED -j ACCEPT
        - sudo bash -c 'iptables-save > /etc/iptables/rules.v4' || true

  - name: spoke1
    hostname: spoke1-lab
    image: ubuntu-24.04
    memory: 512
    cpus: 1
    ssh_port: 2223
    user: yeast
    sudo: nopasswd
    networks:
      - name: backend
        ipv4: 192.168.2.11
    provision:
      packages:
        - wireguard
        - wireguard-tools
      files:
        - source: ./files/spoke1/wg0.conf
          destination: /home/yeast/spoke/wg0.conf
          permissions: "0600"
      shell:
        - sudo mkdir -p /etc/wireguard
        - sudo cp /home/yeast/spoke/wg0.conf /etc/wireguard/wg0.conf
        - sudo chmod 600 /etc/wireguard/wg0.conf
        - sudo wg-quick up wg0 || true
        - sudo systemctl enable wg-quick@wg0

  - name: spoke2
    hostname: spoke2-lab
    image: ubuntu-24.04
    memory: 512
    cpus: 1
    ssh_port: 2224
    user: yeast
    sudo: nopasswd
    networks:
      - name: backend
        ipv4: 192.168.2.12
    provision:
      packages:
        - wireguard
        - wireguard-tools
      files:
        - source: ./files/spoke2/wg0.conf
          destination: /home/yeast/spoke/wg0.conf
          permissions: "0600"
      shell:
        - sudo mkdir -p /etc/wireguard
        - sudo cp /home/yeast/spoke/wg0.conf /etc/wireguard/wg0.conf
        - sudo chmod 600 /etc/wireguard/wg0.conf
        - sudo wg-quick up wg0 || true
        - sudo systemctl enable wg-quick@wg0
