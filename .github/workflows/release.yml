name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            artifact: yeast_linux_amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.5'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-x86 qemu-kvm libvirt-daemon-system

      - name: Build binary
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          go build -trimpath -ldflags \
            "-s -w -X yeast/internal/app.Version=${VERSION}" \
            -o dist/${{ matrix.artifact }} ./cmd/yeast

      - name: Verify binary
        run: |
          ./dist/${{ matrix.artifact }} version

      - name: Create checksums
        run: |
          cd dist
          sha256sum ${{ matrix.artifact }} >> SHA256SUMS.txt

      - name: Package as tar.gz
        run: |
          cd dist
          tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Create checksums for packages
        run: |
          cd dist
          sha256sum *.tar.gz >> SHA256SUMS.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: SHA256SUMS
          path: dist/SHA256SUMS.txt

  create-release:
    name: Create GitHub Release
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Organize release files
        run: |
          mkdir -p release
          cp dist/yeast_linux_amd64/yeast_linux_amd64.tar.gz release/
          cp dist/SHA256SUMS/SHA256SUMS.txt release/
          ls -la release/

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version from CHANGELOG.md
          awk -v ver="## \\\\[${VERSION}\\\\]" '
            $0 ~ ver {found=1; next}
            found && /^## \\\\[/ {exit}
            found {print}
          ' CHANGELOG.md > release-notes.md
          
          # If not found, use a fallback
          if [ ! -s release-notes.md ]; then
            echo "## yeast v${VERSION}" > release-notes.md
            echo "" >> release-notes.md
            echo "See [CHANGELOG.md](https://github.com/Twarga/yeast/blob/main/CHANGELOG.md) for details." >> release-notes.md
          fi
          
          cat release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: yeast ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            release/yeast_linux_amd64.tar.gz
            release/SHA256SUMS.txt
          draft: false
          prerelease: false