name: Deploy Site

on:
  push:
    branches:
      - main
    paths:
      - docs-site/**
      - landing/**
      - .github/workflows/deploy-docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: docs-site

      - name: Build VitePress
        run: npm run build
        working-directory: docs-site

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp -r docs-site/.vitepress/dist/* dist/
          mv dist/assets dist/docs/assets
          cp landing/index.html dist/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
