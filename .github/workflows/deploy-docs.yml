name: Deploy Site

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - landing/**
      - academy/**
      - academy-landing/**
      - assets/**
      - mkdocs.yml
      - mkdocs-academy.yml
      - requirements-docs.txt
      - .github/workflows/deploy-docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: python -m pip install --requirement requirements-docs.txt

      - name: Build MkDocs
        run: mkdocs build --strict --site-dir site-docs

      - name: Build Twarga Academy
        run: mkdocs build -f mkdocs-academy.yml --strict --site-dir site-bootcamp

      - name: Prepare Pages artifact
        run: |
          mkdir -p dist/docs dist/bootcamp dist/assets
          cp -r site-docs/* dist/docs/
          cp -r site-bootcamp/* dist/bootcamp/
          cp assets/logo.svg dist/assets/
          cp assets/ta-logo.svg dist/assets/
          cp assets/twarga-academy-logo.png dist/assets/
          cp assets/favicon.ico dist/assets/
          cp landing/index.html dist/index.html
          cp academy-landing/index.html dist/bootcamp/index.html
          touch dist/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
