<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <filter id="glow-ta" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-ta-soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow halo -->
  <rect x="8" y="8" width="184" height="184" rx="44"
        fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.22" filter="url(#glow-ta-soft)"/>

  <!-- Rounded square border -->
  <rect x="8" y="8" width="184" height="184" rx="44"
        fill="#110d04" stroke="#f59e0b" stroke-width="7" filter="url(#glow-ta)"/>

  <!-- T+A ligature: shared vertical stem forms the backbone -->

  <!-- T crossbar: wide horizontal at top -->
  <line x1="36" y1="54" x2="96" y2="54"
        stroke="#f59e0b" stroke-width="15" stroke-linecap="round"/>

  <!-- Shared stem: T's vertical plus A's left leg -->
  <line x1="66" y1="54" x2="66" y2="152"
        stroke="#f59e0b" stroke-width="15" stroke-linecap="round"/>

  <!-- A right diagonal from top of stem area to bottom-right -->
  <line x1="82" y1="54" x2="164" y2="152"
        stroke="#f59e0b" stroke-width="15" stroke-linecap="round"/>

  <!-- A crossbar across the A triangle -->
  <line x1="84" y1="114" x2="138" y2="114"
        stroke="#f59e0b" stroke-width="11" stroke-linecap="round"/>
</svg>
