<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow halo -->
  <rect x="8" y="8" width="184" height="184" rx="44"
        fill="none" stroke="#22c55e" stroke-width="2" opacity="0.22" filter="url(#glow-soft)"/>

  <!-- Rounded square border -->
  <rect x="8" y="8" width="184" height="184" rx="44"
        fill="#0a130d" stroke="#22c55e" stroke-width="7" filter="url(#glow)"/>

  <!-- Letter Y — three bold strokes -->
  <line x1="58" y1="46" x2="100" y2="103"
        stroke="#22c55e" stroke-width="17" stroke-linecap="round"/>
  <line x1="142" y1="46" x2="100" y2="103"
        stroke="#22c55e" stroke-width="17" stroke-linecap="round"/>
  <line x1="100" y1="103" x2="100" y2="155"
        stroke="#22c55e" stroke-width="17" stroke-linecap="round"/>
</svg>
