site_name: Twarga Academy
site_description: Free DevOps bootcamp with Yeast
site_url: https://twarga.github.io/yeast/bootcamp/
repo_url: https://github.com/Twarga/yeast
repo_name: Twarga/yeast
docs_dir: academy

theme:
  name: material
  logo: assets/ta-logo.svg
  favicon: assets/ta-logo.svg
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: slate
      primary: green
      accent: green

extra_css:
  - stylesheets/academy.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true

nav:
  - Home: index.md
  - Curriculum: curriculum/index.md
  - Modules: modules/index.md
  - Labs:
      - Overview: labs/index.md
      - "01. Linux Server Baseline": 01-linux-server-baseline/lab.md
      - "02. Static Site With Nginx": 02-static-site-nginx/lab.md
      - "03. Reverse Proxy To Backend App": 03-reverse-proxy-backend-app/lab.md
      - "04. Database-Backed App": 04-database-backed-app/lab.md
      - "05. Linux Troubleshooting Drill": 05-linux-troubleshooting-drill/lab.md
      - "06. Bash Automation For Server Setup": 06-bash-automation-server-setup/lab.md
      - "07. Ansible For One Server": 07-ansible-one-server/lab.md
      - "08. Ansible Multi-VM Web Cluster": 08-ansible-multi-vm-web-cluster/lab.md
      - "09. Secrets And Configuration Management": 09-secrets-configuration-management/lab.md
      - "10. Docker Fundamentals On A VM": 10-docker-fundamentals-vm/lab.md
      - "11. Compose Multi-Service App": 11-compose-multi-service-app/lab.md
      - "12. Container Build, Scan, Hardening": 12-container-build-scan-hardening/lab.md
      - "13. CI With GitHub Actions": 13-ci-github-actions/lab.md
      - "14. Self-Hosted CI Runner": 14-self-hosted-ci-runner/lab.md
      - "15. Private Container Registry": 15-private-container-registry/lab.md
      - "16. Progressive Delivery And Rollback": 16-progressive-delivery-rollback/lab.md
      - "17. Prometheus And Grafana Monitoring": 17-prometheus-grafana-monitoring/lab.md
      - "18. Centralized Logging": 18-centralized-logging/lab.md
      - "19. OpenTelemetry Distributed Tracing": 19-opentelemetry-distributed-tracing/lab.md
      - "20. SRE SLOs, Alerts, Error Budgets": 20-sre-slos-alerts-error-budgets/lab.md
      - "21. Backup And Restore Drill": 21-backup-restore-drill/lab.md
      - "22. Chaos And Failure Recovery Drill": 22-chaos-failure-recovery-drill/lab.md
      - "23. Terraform Fundamentals": 23-terraform-fundamentals/lab.md
      - "24. Terraform Modules And Environments": 24-terraform-modules-environments/lab.md
      - "25. GitOps With Argo CD": 25-gitops-argocd-flux/lab.md
      - "26. End-To-End Delivery Platform": 26-end-to-end-delivery-platform/lab.md
      - "27. Kubernetes Foundations With k3s": 27-kubernetes-k3s-foundations/lab.md
      - "28. Kubernetes Networking, Config, Storage": 28-kubernetes-networking-config-storage/lab.md
      - "29. Kubernetes Delivery Capstone": 29-kubernetes-delivery-capstone/lab.md
      - "30. AI-Assisted DevOps And Local LLM Ops": 30-ai-assisted-devops-llm-ops/lab.md
  - Source Contract: support/index.md
