version: 1

networks:
  - name: internal
    cidr: 192.168.40.0/24

instances:
  - name: registry
    hostname: registry
    image: ubuntu-22.04
    memory: 2048
    cpus: 2
    disk_size: 40G
    ssh_port: 2221
    ports:
      - "5000:5000"
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: internal
        ipv4: 192.168.40.10

    provision:
      packages:
        - curl
        - ca-certificates
        - gnupg
      shell:
        - hostnamectl set-hostname registry
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 5000
        - ufw --force enable
        - install -m 0755 -d /etc/apt/keyrings
        - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        - chmod a+r /etc/apt/keyrings/docker.asc
        - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
        - apt-get update -qq
        - apt-get install -y -qq docker-ce docker-ce-cli containerd.io docker-compose-plugin
        - usermod -aG docker ubuntu
        - systemctl enable --now docker

  - name: deployer
    hostname: deployer
    image: ubuntu-22.04
    memory: 1024
    cpus: 2
    disk_size: 20G
    ssh_port: 2222
    ports:
      - "8080:8080"
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: internal
        ipv4: 192.168.40.20

    provision:
      packages:
        - curl
        - ca-certificates
        - gnupg
      shell:
        - hostnamectl set-hostname deployer
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 8080
        - ufw --force enable
        - install -m 0755 -d /etc/apt/keyrings
        - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        - chmod a+r /etc/apt/keyrings/docker.asc
        - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
        - apt-get update -qq
        - apt-get install -y -qq docker-ce docker-ce-cli containerd.io docker-compose-plugin
        - usermod -aG docker ubuntu
        - systemctl enable --now docker
