<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" role="img" aria-labelledby="title desc">
  <title id="title">Twarga Academy logo</title>
  <desc id="desc">A green TA monogram inside a rounded square, matching the Yeast product logo style.</desc>
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="184" height="184" rx="44"
        fill="none" stroke="#22c55e" stroke-width="2" opacity="0.22" filter="url(#glow-soft)"/>
  <rect x="8" y="8" width="184" height="184" rx="44"
        fill="#0a130d" stroke="#22c55e" stroke-width="7" filter="url(#glow)"/>

  <path d="M42 55H102"
        fill="none" stroke="#22c55e" stroke-width="15" stroke-linecap="round"/>
  <path d="M72 55V150"
        fill="none" stroke="#22c55e" stroke-width="15" stroke-linecap="round"/>
  <path d="M112 150L137 55L164 150"
        fill="none" stroke="#22c55e" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M123 116H153"
        fill="none" stroke="#22c55e" stroke-width="11" stroke-linecap="round"/>
</svg>
