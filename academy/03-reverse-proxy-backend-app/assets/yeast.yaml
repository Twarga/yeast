version: 1

networks:
  - name: internal
    cidr: 192.168.10.0/24

instances:
  - name: proxy
    hostname: proxy
    image: ubuntu-22.04
    memory: 1024
    cpus: 2
    disk_size: 20G
    ssh_port: 2203
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: internal
        ipv4: 192.168.10.10

    provision:
      packages:
        - nginx
        - curl
      shell:
        - hostnamectl set-hostname proxy
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 'Nginx Full'
        - ufw --force enable
        - systemctl enable --now nginx

  - name: backend
    hostname: backend
    image: ubuntu-22.04
    memory: 1024
    cpus: 2
    disk_size: 20G
    ssh_port: 2204
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: internal
        ipv4: 192.168.10.20

    provision:
      packages:
        - python3
        - curl
      shell:
        - hostnamectl set-hostname backend
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 8000
        - ufw --force enable
