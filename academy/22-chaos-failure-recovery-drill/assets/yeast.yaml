version: 1

networks:
  - name: internal
    cidr: 192.168.91.0/24

instances:
  - name: chaos-proxy
    hostname: chaos-proxy
    image: ubuntu-22.04
    memory: 1024
    cpus: 2
    disk_size: 20G
    ssh_port: 2236
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: internal
        ipv4: 192.168.91.10

    provision:
      packages:
        - nginx
        - curl
      shell:
        - hostnamectl set-hostname chaos-proxy
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 'Nginx Full'
        - ufw --force enable
        - systemctl enable --now nginx

  - name: chaos-app
    hostname: chaos-app
    image: ubuntu-22.04
    memory: 1024
    cpus: 2
    disk_size: 20G
    ssh_port: 2237
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: internal
        ipv4: 192.168.91.20

    provision:
      packages:
        - python3
        - postgresql
        - postgresql-contrib
        - curl
      shell:
        - hostnamectl set-hostname chaos-app
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 8000
        - ufw --force enable
        - systemctl enable --now postgresql
