version: 1

networks:
  - name: internal
    cidr: 192.168.100.0/24

instances:
  - name: k8s-control
    hostname: k8s-control
    image: ubuntu-22.04
    memory: 2048
    cpus: 2
    disk_size: 30G
    ssh_port: 2248
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: internal
        ipv4: 192.168.100.60

    provision:
      packages:
        - curl
        - vim
      shell:
        - hostnamectl set-hostname k8s-control
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 6443
        - ufw --force enable

  - name: k8s-worker
    hostname: k8s-worker
    image: ubuntu-22.04
    memory: 1024
    cpus: 2
    disk_size: 20G
    ssh_port: 2249
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: internal
        ipv4: 192.168.100.61

    provision:
      packages:
        - curl
      shell:
        - hostnamectl set-hostname k8s-worker
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw --force enable
