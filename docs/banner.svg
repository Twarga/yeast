<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg-glow" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="50%" stop-color="#0f0e0c"/>
      <stop offset="100%" stop-color="#0a0908"/>
    </radialGradient>

    <!-- Amber glow -->
    <radialGradient id="amber-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5ae3d" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f5ae3d" stop-opacity="0"/>
    </radialGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f5ae3d" stroke-width="0.5" opacity="0.06"/>
    </pattern>

    <!-- Glow filter for nodes -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="1280" height="640" fill="url(#bg-glow)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Decorative network nodes on left -->
  <g opacity="0.35">
    <!-- Node connections -->
    <line x1="140" y1="200" x2="240" y2="280" stroke="#f5ae3d" stroke-width="1.5" opacity="0.4"/>
    <line x1="240" y1="280" x2="200" y2="400" stroke="#f5ae3d" stroke-width="1.5" opacity="0.4"/>
    <line x1="140" y1="200" x2="200" y2="400" stroke="#f5ae3d" stroke-width="1" opacity="0.25"/>
    <line x1="140" y1="200" x2="100" y2="320" stroke="#f5ae3d" stroke-width="1" opacity="0.2"/>
    <line x1="100" y1="320" x2="200" y2="400" stroke="#f5ae3d" stroke-width="1.5" opacity="0.35"/>
    <line x1="240" y1="280" x2="320" y2="220" stroke="#f5ae3d" stroke-width="1" opacity="0.3"/>
    <line x1="320" y1="220" x2="340" y2="340" stroke="#f5ae3d" stroke-width="1" opacity="0.25"/>
    <line x1="200" y1="400" x2="340" y2="340" stroke="#f5ae3d" stroke-width="1" opacity="0.3"/>
    <line x1="240" y1="280" x2="340" y2="340" stroke="#f5ae3d" stroke-width="1" opacity="0.2"/>

    <!-- Nodes -->
    <circle cx="140" cy="200" r="8" fill="#f5ae3d" filter="url(#glow)" opacity="0.9"/>
    <circle cx="240" cy="280" r="10" fill="#f5ae3d" filter="url(#glow)" opacity="0.85"/>
    <circle cx="200" cy="400" r="7" fill="#f5ae3d" filter="url(#glow)" opacity="0.8"/>
    <circle cx="100" cy="320" r="6" fill="#f5ae3d" filter="url(#glow)" opacity="0.7"/>
    <circle cx="320" cy="220" r="5" fill="#f5ae3d" filter="url(#glow)" opacity="0.6"/>
    <circle cx="340" cy="340" r="6" fill="#f5ae3d" filter="url(#glow)" opacity="0.75"/>

    <!-- Small particle dots -->
    <circle cx="180" cy="240" r="2.5" fill="#f5ae3d" opacity="0.5"/>
    <circle cx="260" cy="340" r="2" fill="#f5ae3d" opacity="0.4"/>
    <circle cx="120" cy="260" r="2" fill="#f5ae3d" opacity="0.35"/>
    <circle cx="280" cy="240" r="2.5" fill="#f5ae3d" opacity="0.45"/>
    <circle cx="160" cy="360" r="2" fill="#f5ae3d" opacity="0.3"/>
    <circle cx="300" cy="300" r="2" fill="#f5ae3d" opacity="0.4"/>
  </g>

  <!-- Right side terminal mockup -->
  <g transform="translate(780, 160)">
    <!-- Terminal window -->
    <rect x="0" y="0" width="420" height="320" rx="12" fill="#0f0e0c" stroke="#f5ae3d" stroke-width="1.5" opacity="0.9"/>
    <rect x="0" y="0" width="420" height="36" rx="12" fill="#17130f"/>
    <rect x="0" y="18" width="420" height="18" fill="#17130f"/>
    <rect x="1" y="18" width="418" height="301" rx="0" fill="#0f0e0c"/>

    <!-- Window controls -->
    <circle cx="20" cy="18" r="6" fill="#ef6155"/>
    <circle cx="40" cy="18" r="6" fill="#f5ae3d"/>
    <circle cx="60" cy="18" r="6" fill="#46d39b"/>

    <!-- Terminal title -->
    <text x="210" y="23" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#c9b89f" text-anchor="middle" font-weight="600">yeast</text>

    <!-- Terminal content -->
    <text x="20" y="70" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#f5ae3d" font-weight="700">$</text>
    <text x="38" y="70" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#fff5e3">yeast up</text>

    <text x="20" y="100" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#46d39b">&#10003;</text>
    <text x="42" y="100" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#c9b89f">Started</text>
    <text x="110" y="100" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#46d39b">web</text>
    <text x="150" y="100" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#c9b89f">(127.0.0.1:2222)</text>

    <text x="20" y="130" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#46d39b">&#10003;</text>
    <text x="42" y="130" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#c9b89f">Started</text>
    <text x="110" y="130" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#46d39b">target</text>
    <text x="165" y="130" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#c9b89f">(127.0.0.1:2223)</text>

    <text x="20" y="170" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#f5ae3d" font-weight="700">$</text>
    <text x="38" y="170" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#fff5e3">yeast status</text>

    <text x="20" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#46d39b">&#9679;</text>
    <text x="42" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#46d39b">web</text>
    <text x="140" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#46d39b">running</text>
    <text x="240" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#c9b89f">ssh:2222</text>
    <text x="330" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#c9b89f">lab:10.10.10.10</text>

    <text x="20" y="225" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#46d39b">&#9679;</text>
    <text x="42" y="225" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#46d39b">target</text>
    <text x="140" y="225" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#46d39b">running</text>
    <text x="240" y="225" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#c9b89f">ssh:2223</text>
    <text x="330" y="225" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#c9b89f">lab:10.10.10.20</text>

    <text x="20" y="265" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#f5ae3d" font-weight="700">$</text>
    <text x="38" y="265" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#fff5e3">yeast snapshot web clean</text>

    <text x="20" y="295" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#46d39b">&#10003;</text>
    <text x="42" y="295" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#c9b89f">Snapshot saved:</text>
    <text x="175" y="295" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#fff5e3">web/clean</text>
  </g>

  <!-- Main title area -->
  <g transform="translate(80, 240)">
    <!-- Eyebrow -->
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#f5ae3d" font-weight="700" letter-spacing="3">TWARGAOPS LOCAL VM ENGINE</text>

    <!-- Yeast title -->
    <text x="0" y="80" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="120" fill="#fff5e3" font-weight="900" letter-spacing="-2">Yeast</text>

    <!-- Tagline -->
    <text x="0" y="130" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="26" fill="#c9b89f" font-weight="500">Linux-first local VM orchestration for QEMU/KVM</text>

    <!-- Decorative line -->
    <rect x="0" y="160" width="60" height="4" rx="2" fill="#f5ae3d"/>
  </g>

  <!-- Bottom feature badges -->
  <g transform="translate(80, 520)">
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="140" height="44" rx="8" fill="none" stroke="#f5ae3d" stroke-width="1.5" opacity="0.5"/>
      <text x="70" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#f5ae3d" text-anchor="middle" font-weight="700">QEMU/KVM</text>
    </g>
    <g transform="translate(160, 0)">
      <rect x="0" y="0" width="140" height="44" rx="8" fill="none" stroke="#f5ae3d" stroke-width="1.5" opacity="0.5"/>
      <text x="70" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#f5ae3d" text-anchor="middle" font-weight="700">cloud-init</text>
    </g>
    <g transform="translate(320, 0)">
      <rect x="0" y="0" width="140" height="44" rx="8" fill="none" stroke="#f5ae3d" stroke-width="1.5" opacity="0.5"/>
      <text x="70" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#f5ae3d" text-anchor="middle" font-weight="700">SNAPSHOTS</text>
    </g>
    <g transform="translate(480, 0)">
      <rect x="0" y="0" width="140" height="44" rx="8" fill="none" stroke="#f5ae3d" stroke-width="1.5" opacity="0.5"/>
      <text x="70" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#f5ae3d" text-anchor="middle" font-weight="700">LAB NETWORKS</text>
    </g>
    <g transform="translate(640, 0)">
      <rect x="0" y="0" width="100" height="44" rx="8" fill="none" stroke="#f5ae3d" stroke-width="1.5" opacity="0.5"/>
      <text x="50" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#f5ae3d" text-anchor="middle" font-weight="700">JSON</text>
    </g>
  </g>

  <!-- Version badge -->
  <g transform="translate(1160, 60)">
    <rect x="0" y="0" width="80" height="32" rx="16" fill="#f5ae3d" opacity="0.15"/>
    <rect x="0" y="0" width="80" height="32" rx="16" fill="none" stroke="#f5ae3d" stroke-width="1" opacity="0.4"/>
    <text x="40" y="21" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#f5ae3d" text-anchor="middle" font-weight="700">v0.7</text>
  </g>

  <!-- Ambient glow behind terminal -->
  <circle cx="990" cy="320" r="200" fill="url(#amber-glow)"/>
</svg>
