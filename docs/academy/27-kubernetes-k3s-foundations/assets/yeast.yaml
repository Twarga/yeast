version: 1

networks:
  - name: internal
    cidr: 192.168.100.0/24

instances:
  - name: k3s-control
    hostname: k3s-control
    image: ubuntu-22.04
    memory: 2048
    cpus: 2
    disk_size: 30G
    ssh_port: 2241
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: internal
        ipv4: 192.168.100.10

    provision:
      packages:
        - curl
        - vim
      shell:
        - hostnamectl set-hostname k3s-control
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 6443
        - ufw allow 8472
        - ufw allow 10250
        - ufw --force enable

  - name: k3s-worker1
    hostname: k3s-worker1
    image: ubuntu-22.04
    memory: 1024
    cpus: 2
    disk_size: 20G
    ssh_port: 2242
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: internal
        ipv4: 192.168.100.11

    provision:
      packages:
        - curl
      shell:
        - hostnamectl set-hostname k3s-worker1
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 8472
        - ufw allow 10250
        - ufw --force enable

  - name: k3s-worker2
    hostname: k3s-worker2
    image: ubuntu-22.04
    memory: 1024
    cpus: 2
    disk_size: 20G
    ssh_port: 2243
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: internal
        ipv4: 192.168.100.12

    provision:
      packages:
        - curl
      shell:
        - hostnamectl set-hostname k3s-worker2
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 8472
        - ufw allow 10250
        - ufw --force enable
