version: 1

instances:
  - name: secrets
    hostname: secrets
    image: ubuntu-22.04
    memory: 1024
    cpus: 2
    disk_size: 20G
    ssh_port: 2215
    user: ubuntu
    sudo: nopasswd

    provision:
      packages:
        - python3
        - python3-pip
        - postgresql
        - nginx
        - curl
        - vim
      shell:
        - hostnamectl set-hostname secrets
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 'Nginx Full'
        - ufw --force enable
        - systemctl enable --now postgresql
        - systemctl enable --now nginx
