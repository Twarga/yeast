version: 1

networks:
  - name: internal
    cidr: 192.168.100.0/24

instances:
  - name: capstone-control
    hostname: capstone-control
    image: ubuntu-22.04
    memory: 2048
    cpus: 4
    disk_size: 40G
    ssh_port: 2250
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: internal
        ipv4: 192.168.100.70

    provision:
      packages:
        - curl
        - vim
        - git
      shell:
        - hostnamectl set-hostname capstone-control
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 6443
        - ufw allow 8080
        - ufw --force enable

  - name: capstone-worker1
    hostname: capstone-worker1
    image: ubuntu-22.04
    memory: 1024
    cpus: 2
    disk_size: 20G
    ssh_port: 2251
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: internal
        ipv4: 192.168.100.71

    provision:
      packages:
        - curl
      shell:
        - hostnamectl set-hostname capstone-worker1
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw --force enable
