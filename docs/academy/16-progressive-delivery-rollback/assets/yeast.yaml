version: 1

networks:
  - name: internal
    cidr: 192.168.50.0/24

instances:
  - name: lb
    hostname: lb
    image: ubuntu-22.04
    memory: 1024
    cpus: 2
    disk_size: 20G
    ssh_port: 2223
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: internal
        ipv4: 192.168.50.10

    provision:
      packages:
        - nginx
        - curl
      shell:
        - hostnamectl set-hostname lb
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 'Nginx Full'
        - ufw --force enable
        - systemctl enable --now nginx

  - name: blue
    hostname: blue
    image: ubuntu-22.04
    memory: 1024
    cpus: 2
    disk_size: 20G
    ssh_port: 2224
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: internal
        ipv4: 192.168.50.21

    provision:
      packages:
        - python3
        - curl
      shell:
        - hostnamectl set-hostname blue
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 8000
        - ufw --force enable

  - name: green
    hostname: green
    image: ubuntu-22.04
    memory: 1024
    cpus: 2
    disk_size: 20G
    ssh_port: 2225
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: internal
        ipv4: 192.168.50.22

    provision:
      packages:
        - python3
        - curl
      shell:
        - hostnamectl set-hostname green
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 8000
        - ufw --force enable
