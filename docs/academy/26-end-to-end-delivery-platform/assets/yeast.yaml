version: 1

networks:
  - name: platform
    cidr: 192.168.110.0/24

instances:
  - name: plat-proxy
    hostname: plat-proxy
    image: ubuntu-22.04
    memory: 1024
    cpus: 2
    disk_size: 20G
    ssh_port: 2244
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: platform
        ipv4: 192.168.110.10

    provision:
      packages:
        - nginx
        - curl
      shell:
        - hostnamectl set-hostname plat-proxy
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 'Nginx Full'
        - ufw --force enable
        - systemctl enable --now nginx

  - name: plat-app
    hostname: plat-app
    image: ubuntu-22.04
    memory: 1024
    cpus: 2
    disk_size: 20G
    ssh_port: 2245
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: platform
        ipv4: 192.168.110.20

    provision:
      packages:
        - curl
        - ca-certificates
        - gnupg
      shell:
        - hostnamectl set-hostname plat-app
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 8080
        - ufw --force enable
        - install -m 0755 -d /etc/apt/keyrings
        - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        - chmod a+r /etc/apt/keyrings/docker.asc
        - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
        - apt-get update -qq
        - apt-get install -y -qq docker-ce docker-ce-cli containerd.io docker-compose-plugin
        - usermod -aG docker ubuntu
        - systemctl enable --now docker

  - name: plat-db
    hostname: plat-db
    image: ubuntu-22.04
    memory: 1024
    cpus: 2
    disk_size: 30G
    ssh_port: 2246
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: platform
        ipv4: 192.168.110.30

    provision:
      packages:
        - postgresql
        - postgresql-contrib
      shell:
        - hostnamectl set-hostname plat-db
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 5432
        - ufw --force enable
        - systemctl enable --now postgresql

  - name: plat-monitoring
    hostname: plat-monitoring
    image: ubuntu-22.04
    memory: 2048
    cpus: 2
    disk_size: 30G
    ssh_port: 2247
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: platform
        ipv4: 192.168.110.40

    provision:
      packages:
        - curl
        - ca-certificates
        - gnupg
      shell:
        - hostnamectl set-hostname plat-monitoring
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 9090
        - ufw allow 3000
        - ufw allow 3100
        - ufw --force enable
        - install -m 0755 -d /etc/apt/keyrings
        - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        - chmod a+r /etc/apt/keyrings/docker.asc
        - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
        - apt-get update -qq
        - apt-get install -y -qq docker-ce docker-ce-cli containerd.io docker-compose-plugin
        - usermod -aG docker ubuntu
        - systemctl enable --now docker
