version: 1

networks:
  - name: internal
    cidr: 192.168.100.0/24

instances:
  - name: gitops-cluster
    hostname: gitops-cluster
    image: ubuntu-22.04
    memory: 4096
    cpus: 4
    disk_size: 40G
    ssh_port: 2240
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: internal
        ipv4: 192.168.100.50

    provision:
      packages:
        - curl
        - vim
        - git
      shell:
        - hostnamectl set-hostname gitops-cluster
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 6443
        - ufw allow 8080
        - ufw --force enable
