version: 1

instances:
  - name: llm
    hostname: llm
    image: ubuntu-22.04
    memory: 4096
    cpus: 4
    disk_size: 50G
    ssh_port: 2252
    user: ubuntu
    sudo: nopasswd

    provision:
      packages:
        - curl
        - vim
        - python3
        - python3-pip
      shell:
        - hostnamectl set-hostname llm
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 11434
        - ufw allow 3000
        - ufw --force enable
        - curl -fsSL https://ollama.com/install.sh | sh
        - systemctl enable --now ollama
