        - ufw --force enable
        - systemctl enable --now nginx

  - name: web3
    hostname: web3
    image: ubuntu-22.04
    memory: 1024
    cpus: 2
    disk_size: 20G
    ssh_port: 2214
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: internal
        ipv4: 192.168.30.23

    provision:
      packages:
        - nginx
