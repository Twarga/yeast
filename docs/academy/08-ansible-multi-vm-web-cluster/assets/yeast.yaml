version: 1

networks:
  - name: internal
    cidr: 192.168.30.0/24

instances:
  - name: lb
    hostname: lb
    image: ubuntu-22.04
    memory: 1024
    cpus: 2
    disk_size: 20G
    ssh_port: 2211
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: internal
        ipv4: 192.168.30.10

    provision:
      packages:
        - nginx
        - python3
        - curl
      shell:
        - hostnamectl set-hostname lb
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 'Nginx Full'
        - ufw --force enable
        - systemctl enable --now nginx

  - name: web1
    hostname: web1
    image: ubuntu-22.04
    memory: 1024
    cpus: 2
    disk_size: 20G
    ssh_port: 2212
    user: ubuntu
    sudo: nopasswd
    networks:
      - name: internal
        ipv4: 192.168.30.21

    provision:
      packages:
        - nginx
        - python3
        - curl
      shell:
        - hostnamectl set-hostname web1
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw allow 80
        - ufw --force enable
        - systemctl enable --now nginx

  - name: web2
    hostname: web2
    image: ubuntu-22.04
    memory: 1024
