version: 1

instances:
  - name: ci
    hostname: ci
    image: ubuntu-22.04
    memory: 1024
    cpus: 2
    disk_size: 20G
    ssh_port: 2219
    user: ubuntu
    sudo: nopasswd

    provision:
      packages:
        - curl
        - vim
        - git
        - gh
      shell:
        - hostnamectl set-hostname ci
        - timedatectl set-timezone UTC
        - ufw allow OpenSSH
        - ufw --force enable
