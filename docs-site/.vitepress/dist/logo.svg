<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer rounded square -->
  <rect x="10" y="10" width="180" height="180" rx="40" ry="40"
        fill="none" stroke="#22c55e" stroke-width="10" filter="url(#glow)"/>

  <!-- Letter Y — single path, clean junction -->
  <path d="M 52 42 L 93 95 L 148 42 L 130 42 L 93 95 L 70 42 Z
           M 93 95 L 93 158 L 107 158 L 107 95 Z"
        fill="#22c55e" fill-rule="evenodd"/>
</svg>
