<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer rounded square -->
  <rect x="10" y="10" width="180" height="180" rx="40" ry="40"
        fill="none" stroke="#22c55e" stroke-width="10" filter="url(#glow)"/>

  <!-- Letter Y -->
  <g fill="#22c55e">
    <!-- Left diagonal stroke -->
    <rect x="45" y="35" width="14" height="65" rx="7" transform="rotate(-30 52 67)"/>
    <!-- Right diagonal stroke -->
    <rect x="105" y="35" width="14" height="65" rx="7" transform="rotate(30 112 67)"/>
    <!-- Vertical stem -->
    <rect x="93" y="78" width="14" height="75" rx="7"/>
  </g>
</svg>